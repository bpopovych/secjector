---
name: CHR smoke (Docker + KVM)

'on':
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  chr-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Password set by serial-setup.exp on first boot (RouterOS 7.22+
      # requires a password change wizard before allowing SSH login).
      SSHPASS: "ci"
      SSH_OPTS: >-
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o PubkeyAuthentication=no
        -o PreferredAuthentications=keyboard-interactive
        -p 2222
      SCP_OPTS: >-
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o PubkeyAuthentication=no
        -o PreferredAuthentications=keyboard-interactive
        -P 2222
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanity check required files
        run: |
          set -euxo pipefail
          files=(
            secrets.rsc
            tests/secrets.yaml
            tests/integration/example_main.rsc
            tests/integration/ci_runner.rsc
          )
          for f in "${files[@]}"; do
            echo "check:$f"
            test -f "$f" || { echo "::error file=$f::missing"; exit 1; }
          done

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y expect openssh-client sshpass

      - name: Boot CHR via Docker
        run: |
          # chr-start.sh replaces start.sh (bridge networking) with
          # -netdev user + port forwarding so CI can reach SSH on 2222.
          KVM_DEVICE=""
          [ -e /dev/kvm ] && KVM_DEVICE="--device /dev/kvm"
          chmod +x .github/scripts/chr-start.sh
          docker run -d --name chr \
            $KVM_DEVICE \
            -p 2222:2222 \
            -p 5555:5555 \
            -v "$PWD/.github/scripts/chr-start.sh:/chr-start.sh" \
            --entrypoint /chr-start.sh \
            mikrotik/chr:stable
          sleep 10

      - name: Configure CHR via serial (expect)
        run: expect .github/scripts/serial-setup.exp

      - name: Wait for SSH
        run: |
          for i in {1..30}; do
            if sshpass -e ssh $SSH_OPTS admin@127.0.0.1 \
              ':put [/system resource get version]' 2>/dev/null
            then
              echo "SSH up"; exit 0
            fi
            sleep 2
          done
          echo "SSH did not come up"
          docker logs chr
          exit 1

      - name: Push test files
        run: |
          sshpass -e scp $SCP_OPTS \
            secrets.rsc \
            tests/secrets.yaml \
            tests/integration/example_main.rsc \
            tests/integration/ci_runner.rsc \
            admin@127.0.0.1:

      - name: Run injector smoke test
        run: |
          sshpass -e ssh $SSH_OPTS admin@127.0.0.1 \
            '/import file-name=ci_runner.rsc'
          result=$(sshpass -e ssh $SSH_OPTS admin@127.0.0.1 \
            ':put [/file get ci-result.txt contents]')
          echo "result: $result"
          echo "$result" | grep -q 'TEST_OK:'

      - name: Show router log on failure
        if: failure()
        run: |
          sshpass -e ssh $SSH_OPTS admin@127.0.0.1 \
            '/log print' 2>/dev/null || true
          docker logs chr 2>&1 | tail -50

      - name: Teardown
        if: always()
        run: |
          docker stop chr 2>/dev/null || true
          docker rm chr 2>/dev/null || true
